name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - run: bun run biome check

      - run: bun run cloudflare:types

      - run: bun run tsc --noEmit

      - run: bun run cloudflare:build

      - run: bun run test/cloudflare-extract.ts

      - run: bun run test:db

      - run: bun run test:cli

      - run: bun run build:ui

      - run: bun run test:pack

      - run: bun run test:packed-runtime

      - run: bunx playwright install --with-deps chromium

      # test:smoke starts an isolated server and covers REST API, browser UI, and MCP app.
      - run: bun run test:smoke

      - run: npm publish --provenance
